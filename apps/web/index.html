<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>QuadState</title>
    <style>
      html, body, #app { margin: 0; height: 100%; overflow: hidden; }
      body { background: #FFFFFF; color: #1C2128; font: 13px system-ui, sans-serif; }
      /* Settings → Reduce motion: neutralise animations/transitions app-wide.
         The OS prefers-reduced-motion is handled by per-component @media rules;
         this honours the in-app toggle (set on <html> by settings.svelte.ts). */
      html[data-reduced-motion="1"] *,
      html[data-reduced-motion="1"] *::before,
      html[data-reduced-motion="1"] *::after {
        animation-duration: 0.001ms !important;
        animation-delay: 0ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    </style>
  </head>
  <body>
    <script>
      // Apply the saved theme before the app mounts so a dark-theme user never
      // flashes the white default (and vice-versa). Mirrors settings.svelte.ts.
      (function () {
        var t = "light";
        try {
          var raw = localStorage.getItem("quadstate:settings:v1");
          if (raw) { var s = JSON.parse(raw); if (s && (s.theme === "light" || s.theme === "dark")) t = s.theme; }
        } catch (e) { /* ignore */ }
        document.documentElement.dataset.theme = t;
        document.body.style.background = t === "dark" ? "#0B0D11" : "#FFFFFF";
        document.body.style.color = t === "dark" ? "#E8EBF1" : "#1C2128";
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
